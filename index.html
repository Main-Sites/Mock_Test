<style>

/* ===== BODY ===== */
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* ===== CONTAINER ===== */
.container {
    width: 85%;
    margin: auto;
    margin-top: 20px;
    padding: 25px;
    border-radius: 15px;
    position: relative;

    border: 3px solid transparent;
    background:
        linear-gradient(#203a43,#203a43) padding-box,
        linear-gradient(45deg, orange, cyan) border-box;
}

/* ===== LOGO ===== */
.logo {
    position: absolute;
    left: 15px;
    top: 15px;
    width: 120px;
}

/* ===== TIMER ===== */
#timer {
    position: absolute;
    right: 20px;
    top: 20px;
    font-size: 18px;
    color: yellow;
    font-weight: bold;
}

/* ===== TITLE ===== */
h1 { margin-top: 20px; }
h2 { font-weight: normal; }

/* ===== FORM ===== */
input {
    padding: 10px;
    margin: 8px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    background: #00e6c3;
    color: black;
    font-weight: bold;
    box-shadow: 0 4px 0 black;
}

button:hover {
    background: orange;
}

/* ===== QUESTION BOX ===== */
#questionBox {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
}

/* ===== OPTIONS STYLE (UPDATED UI) ===== */
.option-btn {
    display: inline-block;
    margin: 12px;
    padding: 12px 25px;
    background: #00e6c3;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 5px 0 black;
    transition: 0.2s;
}

.option-btn:hover {
    background: #00c2a3;
    transform: translateY(-2px);
}

.option-btn:active {
    transform: translateY(2px);
}

/* ===== RESULT ===== */
#result {
    font-size: 22px;
    margin-top: 20px;
    color: yellow;
}

/* ===== FOOTER (UNCHANGED - MY DESIGN) ===== */
.footer {
  background:black;
  padding:20px 10px;
  text-align:center;
  margin-top:40px;
  border-top:3px solid cyan;
}

.footer p {
  margin:5px 0;
}

.socials {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-top:10px;
}

.Lside-img {
  width:450px;
  float: left;
  margin-right: 30px;
}

.Rside-img {
  width:450px;
  float:right;
  margin-left: 30px;
  
}

.socials i {
  font-size:20px;
  color:#00e6c3;
  cursor:pointer;
}

.center-logo {
  width:40px;
}
#nextLink {
  display: none; /* keep hidden initially */
  color: blue;
  font-weight: bold;
  padding: 8px 15px;
  text-decoration: none;
  
  /* Gradient background */
  background: linear-gradient(90deg, yellow, orange, yellow);
  background-size: 200% 200%;
  border-radius: 5px;

  /* Animation */
  animation: glow 2s linear infinite;
}

/* Animation effect */
@keyframes glow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
#Textafterlink {
  color: yellow;
  font-weight: bold;
  font-size: 18px;
  margin-top: 10px;

  /* Glow effect */
  text-shadow: 0 0 5px yellow, 0 0 10px orange, 0 0 15px yellow;

  /* Animation */
  animation: blinkGlow 1.5s infinite alternate;
}

/* Animation keyframes */
@keyframes blinkGlow {
  0% {
    opacity: 1;
    text-shadow: 0 0 5px yellow, 0 0 10px orange;
  }
  100% {
    opacity: 0.6;
    text-shadow: 0 0 15px yellow, 0 0 25px orange;
  }
}

</style>

</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/Main-Sites/Mock_Test/refs/heads/main/img/logo.png" class="logo">
<div id="timer">Time: 20:00</div>

<h1>Nootech Computer Centre</h1>
<h2>Online Mock Test Portal</h2>

<!-- ===== FORM ===== -->
<div id="formSection">
    <input type="text" id="name" placeholder="Candidate Name"><br>
    <input type="text" id="whatsapp" placeholder="WhatsApp Number"><br>
    <input type="date" id="date"><br><br>

    <button onclick="startTest()">Start Test</button>
</div>

<!-- ===== QUIZ ===== -->
<div id="quizSection" style="display:none;">

    <div id="questionBox"></div>

    <!-- UPDATED BUTTON STYLE (LOGIC SAME) -->
    <div>
        <div class="option-btn" onclick="check('A')" id="A"></div>
        <div class="option-btn" onclick="check('B')" id="B"></div>
        <div class="option-btn" onclick="check('C')" id="C"></div>
        <div class="option-btn" onclick="check('D')" id="D"></div>
    </div>

    <br><br>
    <button id="submitBtn" style="display:none;" onclick="submitData()">Submit Test</button>
</div>

<div id="result"></div>
<a href="https://nootechcomputercentre.github.io/main-site/" id="nextLink" target="_blank">Click Me!!</a>
</div>

<!-- ===== FOOTER (UNCHANGED) ===== -->
<div class="footer">

  <p>© 2026 Nootech Computer Centre. All Rights Reserved.</p>

  <div class="socials">

    <img src="https://raw.githubusercontent.com/Main-Sites/Mock_Test/refs/heads/main/img/Admopen.gif" class="Lside-img">

    <a href="https://www.facebook.com/profile.php?id=61567543754358" target="_blank"><i class="fab fa-facebook"></i></a>
   <a href="https://www.instagram.com/nootechcomputercentre" target="_blank"> <i class="fab fa-instagram"></i></a>
    <a href="https://www.threads.com/@nootechcomputercentre?xmt=AQF0I3PifDtR-If3dQHBkoPYyaX6wlz8u1ChnD7v0Qm_jQ8" target="_blank"><i class="fab fa-threads"></i></a>
    <a href="https://nootechcomputercentre.github.io/main-site/" target="_blank"><i class="fas fa-globe"></i></a>

    <img src="https://raw.githubusercontent.com/Main-Sites/Mock_Test/refs/heads/main/img/joinnow.gif" class="Rside-img">

  </div>

</div>

<div id="result"></div>
<p id="Textafterlink"></p>
<a href="https://nootechcomputercentre.github.io/main-site/" id="nextLink" style="display:none;" target="_blank">Click Me!!!</a>




<script>
let q = [];
let i = 0;
let score = 0;
let answers = {}; // IMPORTANT

/*=====Timer Variable===*/
let timeLeft = 1200; // 20 minutes
let timerInterval;

/*===== Start Timer Function*/
function startTimer(){

    timerInterval = setInterval(function(){

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        document.getElementById("timer").innerText =
        "Time: " + minutes + ":" + seconds;

        timeLeft--;

        if(timeLeft < 0){
            clearInterval(timerInterval);
            document.getElementById("timer").innerText = "Time Over ⛔";
            alert("Time is up! Test will be submitted.");
            submitData();
        }

    }, 1000);
}



async function loadQuestionsFromSheet() {
    const res = await fetch("https://script.google.com/macros/s/AKfycbw-1558uu1xXl76sWb46G0HHRmJAIYcl3RiePloyNSlvU_rQiSasCYodN8RkmK5owr1Eg/exec");
    q = await res.json();
}




/* ===== QUESTIONS ===== 
let q = [
{question:"What is CPU?",A:"Brain",B:"Mouse",C:"Monitor",D:"Keyboard",ans:"A"},
{question:"Excel is used for?",A:"Typing",B:"Calculation",C:"Gaming",D:"Music",ans:"B"},
{question:"Full form of WWW?",A:"World Wide Web",B:"Wide World Web",C:"Web World Wide",D:"None",ans:"A"},
{question:"Which is input device?",A:"Monitor",B:"Printer",C:"Keyboard",D:"Speaker",ans:"C"},
{question:"Which is output device?",A:"Mouse",B:"Keyboard",C:"Printer",D:"Scanner",ans:"C"}
];

let i = 0;
let score = 0;*/

/* ===== START ===== */
async function startTest(){

    let name = document.getElementById("name").value;
    let whatsapp = document.getElementById("whatsapp").value;

    if(name == "" || whatsapp == ""){
        alert("Please fill all details");
        return;
    }

    // LOAD QUESTIONS FROM GOOGLE SHEET
    await loadQuestionsFromSheet();

    document.getElementById("formSection").style.display = "none";
    document.getElementById("quizSection").style.display = "block";
	
	 startTimer(); // 🔥 HERE

    loadQ();
}

/* ===== LOAD QUESTION ===== */
function loadQ(){
    document.getElementById("questionBox").innerText = (i+1)+". "+q[i].question;

    document.getElementById("A").innerText = "A. "+q[i].A;
    document.getElementById("B").innerText = "B. "+q[i].B;
    document.getElementById("C").innerText = "C. "+q[i].C;
    document.getElementById("D").innerText = "D. "+q[i].D;
}

/* ===== CHECK ===== */
function check(ans){

    // SAVE ANSWER
    answers[i] = ans;

    if(ans == q[i].ans){
        score++;
    }

    i++;

    if(i < q.length){
        loadQ();
    } else {
        document.getElementById("submitBtn").style.display = "inline-block";
        document.getElementById("questionBox").innerText = "Test Completed!";
        document.getElementById("A").style.display="none";
        document.getElementById("B").style.display="none";
        document.getElementById("C").style.display="none";
        document.getElementById("D").style.display="none";
    }
}

/* ===== SUBMIT ===== */
function submitData(){
clearInterval(timerInterval);
let name = document.getElementById("name").value;
let whatsapp = document.getElementById("whatsapp").value;
let date = document.getElementById("date").value;

let data = {
    name: name,
    whatsapp: whatsapp,
    date: date,
    score: score,
    answers: answers
};

fetch("https://script.google.com/macros/s/AKfycbw-1558uu1xXl76sWb46G0HHRmJAIYcl3RiePloyNSlvU_rQiSasCYodN8RkmK5owr1Eg/exec", {
    method: "POST",
    mode: "no-cors",   // 🔥 IMPORTANT FIX
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
})
.then(() => {
    document.getElementById("result").innerHTML =
    "<h2>Score: "+score+" / "+q.length+"</h2>";

// Show link AFTER result
document.getElementById("Textafterlink").innerText = "To know more about your Complete Response details , Click on the Button Click Me!! , then click on Whatsapp Chartbox at the bottom right, enter your Name,e-mail,Mobile no & Send it.";
document.getElementById("nextLink").style.display = "inline";

});}
</script>
</body>
</html>
